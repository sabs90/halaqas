<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halaqas – Design Inspiration</title>
<style>
  body { margin: 0; padding: 40px; background: #f5f5f0; font-family: system-ui, sans-serif; }
  h1 { text-align: center; color: #1E5248; margin-bottom: 40px; }
  h2 { color: #1E5248; margin-top: 48px; margin-bottom: 16px; }
  img { max-width: 100%; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .container { max-width: 1000px; margin: 0 auto; }
  .patterns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
</style>
</head>
<body>
<div class="container">
  <h1>Halaqas – Design Inspiration</h1>

  <h2>Inspiration</h2>
  <img src="/inspiration.jpg" alt="Inspiration">

  <h2>Font Preference</h2>
  <img src="/font-pref.png" alt="Font preference">

  <h2>Patterns</h2>
  <div class="patterns">
    <img src="/pattern1.png" alt="Pattern 1">
    <img src="/pattern2.png" alt="Pattern 2">
    <img src="/pattern3.png" alt="Pattern 3">
  </div>
</div>
</body>
</html>
